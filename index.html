<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://i.ibb.co/ch69RTHX/cc.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiitOne - Student Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div id="login-section" class="flex items-center justify-center min-h-screen transition-opacity duration-300">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">KiitOne</h1>
            <p class="text-gray-500 mb-6">Student Hub Verification Required</p>
            
            <div id="step-1-roll" class="space-y-4">
                <input 
                    type="number" 
                    id="kiitRoll" 
                    placeholder="Enter Roll Number (e.g. 24051693)" 
                    class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none"
                >
                <button 
                    id="btn-send-otp"
                    onclick="sendOtp()" 
                    class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
                >
                    Send Verification Code
                </button>
            </div>

            <div id="step-2-otp" class="hidden space-y-4">
                <p class="text-sm text-gray-500">
                    OTP sent to <span id="display-email" class="font-bold text-gray-700"></span>
                </p>
                <input 
                    type="number" 
                    id="otpInput" 
                    placeholder="Enter 6-digit OTP" 
                    class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 tracking-widest text-center"
                >
                <button 
                    id="btn-verify-otp"
                    onclick="verifyOtp()" 
                    class="w-full bg-green-500 text-white font-semibold py-2 rounded-md hover:bg-green-600 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
                >
                    Verify & Login
                </button>
                <button onclick="resetLogin()" class="text-sm text-blue-500 hover:text-blue-700 underline mt-2">
                    Change Roll Number
                </button>
            </div>

            <p id="loginStatus" class="mt-4 text-sm font-medium min-h-[20px]"></p>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen p-8 max-w-4xl mx-auto flex-col transition-opacity duration-300">
        
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-lg shadow-sm border-b-4 border-blue-500">
            <div>
                <h1 class="text-3xl font-bold text-blue-600">KiitOne Dashboard</h1>
                <p id="welcome-message" class="text-gray-500 text-sm mt-1 uppercase">Welcome, Student</p>
            </div>
            
            <div class="relative">
                <button onclick="toggleProfileMenu()" class="flex items-center gap-3 focus:outline-none bg-white px-3 py-2 rounded-full shadow-sm border border-gray-200 hover:bg-gray-50 transition">
                    <div class="w-9 h-9 bg-gradient-to-tr from-blue-500 to-purple-500 text-white rounded-full flex items-center justify-center font-bold text-sm shadow-sm">
                        <span id="nav-initial">S</span>
                    </div>
                    <div class="text-left hidden md:block">
                        <p id="nav-name" class="text-sm font-semibold text-gray-700 leading-tight">Student</p>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>

                <div id="profile-menu" class="hidden absolute right-0 mt-3 w-64 bg-white rounded-xl shadow-xl py-2 z-50 border border-gray-100 transform transition-all">
                    <div class="px-5 py-4 border-b border-gray-100 bg-gray-50/50">
                        <p class="text-base font-bold text-gray-800 truncate" id="profile-name">Student Name</p>
                        <p class="text-xs font-medium text-gray-500 truncate mt-1">Roll: <span id="profile-roll">Loading...</span></p>
                        <p class="text-xs text-blue-500 truncate mt-1" id="profile-email">student@kiit.ac.in</p>
                    </div>
                    
                    <div class="py-2">
                        <a href="https://www.instagram.com/kiitone39?igsh=enNkcnA5d2F4cHl4" target="_blank" class="block px-5 py-2.5 text-sm font-medium text-gray-700 hover:bg-pink-50 hover:text-pink-600 transition flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-pink-500" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                            </svg>
                            Contact us on Instagram
                        </a>
                    </div>
                    
                    <div class="py-2 border-t border-gray-100">
                        <button onclick="logoutStudent()" class="w-full text-left px-5 py-2.5 text-sm font-medium text-red-600 hover:bg-red-50 hover:text-red-700 transition flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                            Log Out
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-grow">
            <button onclick="openApp('https://kiitfaculty.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-purple-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Faculty Review</h2>
                <p class="text-gray-500 text-sm">Read and write anonymous reviews for your professors.</p>
            </button>

            <button onclick="openApp('https://kiitresources.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-blue-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Study Material</h2>
                <p class="text-gray-500 text-sm">Access previous year papers, notes, and assignments.</p>
            </button>

            <button onclick="openApp('https://kiitcalendar.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-green-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Academic Calendar</h2>
                <p class="text-gray-500 text-sm">Track important exam dates and college holidays.</p>
            </button>

            <button onclick="openApp('https://kiitgpacalculator.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-yellow-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">GPA Calculator</h2>
                <p class="text-gray-500 text-sm">Calculate your SGPA and CGPA easily.</p>
            </button>

            <button onclick="openApp('https://kiitroutine.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-red-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Class Routine</h2>
                <p class="text-gray-500 text-sm">Check your daily lecture schedule and room numbers.</p>
            </button>
            <button onclick="openApp('https://kiitsectionswap.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-red-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Section Swapping</h2>
                <p class="text-gray-500 text-sm">Currently we are working on it.</p>
            </button>
        </div>

        <footer class="mt-12 text-center text-gray-400 text-sm">
            Made by Bhai Virendra 💜
        </footer>
    </div>

    <div id="app-viewer-section" class="hidden h-screen w-full flex-col bg-gray-100">
        <div class="bg-white shadow-sm px-6 py-4 flex items-center justify-between z-10">
            <button onclick="closeApp()" class="text-blue-600 font-semibold hover:text-blue-800 flex items-center gap-2 transition bg-blue-50 px-4 py-2 rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Back to Dashboard
            </button>
            <h1 class="text-lg font-bold text-gray-700">KiitOne</h1>
        </div>
        
        <iframe id="app-frame" src="" class="w-full flex-grow border-none"></iframe>
    </div>

    <script>
        const MASTER_API_URL = "https://script.google.com/macros/s/AKfycbxNQN6MCMIb9JldeJgjrjyniaobcNQlgdFriiKfX5WPMLVEsi7z6vjm8Kgrs-l47tL_/exec";
        
        const STORAGE_KEY = 'kiit_user_session_hub'; 
        
        let loggedInUser = "";
        let pendingRoll = "";
        
        // DOM Elements
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const appViewerSection = document.getElementById('app-viewer-section');
        const appFrame = document.getElementById('app-frame');
        const statusEl = document.getElementById('loginStatus');

        window.addEventListener('DOMContentLoaded', () => {
            const storedSession = localStorage.getItem(STORAGE_KEY);
            if (storedSession) {
                try {
                    const userData = JSON.parse(storedSession);
                    if(userData && userData.roll) {
                        loggedInUser = userData.roll;
                        updateDashboardUI(userData);
                    }
                } catch (e) {
                    console.error("Local storage parsing error, resetting session.", e);
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
        });

        function sendOtp() {
            const rollInput = document.getElementById('kiitRoll');
            const btn = document.getElementById('btn-send-otp');
            const roll = rollInput.value.trim();
            
            if (roll.length < 5) {
                showStatus("Invalid Roll Number", "text-red-500");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending...";
            showStatus("", "");

            // Using the Master API to send OTP
            fetch(MASTER_API_URL, {
                method: "POST",
                body: JSON.stringify({ action: 'send_otp', roll: roll })
            })
            .then(res => res.json())
            .then(data => {
                if (data.result === 'success') {
                    pendingRoll = roll;
                    document.getElementById('step-1-roll').classList.add('hidden');
                    document.getElementById('step-2-otp').classList.remove('hidden');
                    document.getElementById('display-email').innerText = roll + "@kiit.ac.in";
                    showStatus("OTP sent to your KIIT email.", "text-green-500");
                } else {
                    throw new Error(data.error || "Failed to send");
                }
            })
            .catch(err => {
                console.error("OTP Error:", err);
                // Improved Error Message
                const errorMsg = err.message === "Failed to fetch" 
                    ? "Network Error. Is your internet connected?" 
                    : err.message;
                showStatus("Error: " + errorMsg, "text-red-500");
                
                btn.disabled = false;
                btn.innerText = "Send Verification Code";
            });
        }

        function verifyOtp() {
            const otpInput = document.getElementById('otpInput');
            const btn = document.getElementById('btn-verify-otp');
            const otp = otpInput.value.trim();
            
            if (otp.length < 6) {
                showStatus("Enter 6-digit OTP", "text-red-500");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verifying & Loading Profile...";

            // The Master API verifies the OTP AND fetches the name securely!
            fetch(MASTER_API_URL, {
                method: "POST",
                body: JSON.stringify({ action: 'verify_otp', roll: pendingRoll, otp: otp })
            })
            .then(res => res.json())
            .then(data => {
                if (data.result === 'success') {
                    
                    // The server already fetched the real name and email for us
                    const sessionData = {
                        roll: pendingRoll,
                        name: data.name,
                        email: data.email,
                        isVerified: true
                    };

                    // Save to local storage for future visits
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(sessionData));
                    loggedInUser = pendingRoll;
                    
                    // Load Dashboard instantly
                    updateDashboardUI(sessionData);

                } else {
                    showStatus(data.error || "Invalid OTP", "text-red-500");
                    btn.disabled = false;
                    btn.innerText = "Verify & Login";
                }
            })
            .catch(err => {
                console.error("Verification Error:", err);
                const errorMsg = err.message === "Failed to fetch" 
                    ? "Network Error. Check connection." 
                    : err.message;
                showStatus("Error: " + errorMsg, "text-red-500");
                
                btn.disabled = false;
                btn.innerText = "Verify & Login";
            });
        }

        function resetLogin() {
            document.getElementById('step-1-roll').classList.remove('hidden');
            document.getElementById('step-2-otp').classList.add('hidden');
            document.getElementById('btn-send-otp').disabled = false;
            document.getElementById('btn-send-otp').innerText = "Send Verification Code";
            document.getElementById('otpInput').value = "";
            showStatus("", "");
        }

        function logoutStudent() {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }

        // Profile Menu Logic
        function toggleProfileMenu() {
            const menu = document.getElementById('profile-menu');
            menu.classList.toggle('hidden');
        }

        // Close the dropdown if the user clicks anywhere else on the screen
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('profile-menu');
            if(menu) {
                const profileBtn = menu.previousElementSibling; 
                if (!menu.contains(event.target) && !profileBtn.contains(event.target)) {
                    menu.classList.add('hidden');
                }
            }
        });

        // UI Update Logic
        function updateDashboardUI(userData) {
            loginSection.classList.remove('flex');
            loginSection.classList.add('hidden');
            
            dashboardSection.classList.remove('hidden');
            dashboardSection.classList.add('flex');
            
            // Capitalized for the main welcome header
            document.getElementById('welcome-message').innerText = `WELCOME, ${userData.name.toUpperCase()}`;
            document.getElementById('profile-name').innerText = userData.name;
            document.getElementById('profile-roll').innerText = userData.roll;
            
            if (document.getElementById('profile-email')) {
                document.getElementById('profile-email').innerText = userData.email || `${userData.roll}@kiit.ac.in`;
            }
            if (document.getElementById('nav-name')) {
                document.getElementById('nav-name').innerText = userData.name.split(' ')[0]; 
            }
            if (document.getElementById('nav-initial')) {
                document.getElementById('nav-initial').innerText = userData.name.charAt(0).toUpperCase();
            }
        }

        function showStatus(msg, colorClass) {
            statusEl.innerText = msg;
            statusEl.className = `mt-4 text-sm font-medium min-h-[20px] ${colorClass}`;
        }

        function openApp(url) {
            dashboardSection.classList.remove('flex');
            dashboardSection.classList.add('hidden');
            
            appViewerSection.classList.remove('hidden');
            appViewerSection.classList.add('flex');
            appFrame.src = url; 
        }

        function closeApp() {
            appViewerSection.classList.remove('flex');
            appViewerSection.classList.add('hidden');
            
            dashboardSection.classList.remove('hidden');
            dashboardSection.classList.add('flex');
            appFrame.src = ""; 
        }
    </script>
</body>
</html>
