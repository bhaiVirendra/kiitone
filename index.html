<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://i.ibb.co/PsXFwZn6/cat.gif" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiitOne - Student Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div id="login-section" class="flex items-center justify-center min-h-screen transition-opacity duration-300">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">kiitone</h1>
            <p class="text-gray-500 mb-6">Student Hub Verification Required</p>
            
            <div id="step-1-roll" class="space-y-4">
                <input 
                    type="number" 
                    id="kiitRoll" 
                    placeholder="Enter Roll Number (e.g. 2105123)" 
                    class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none"
                >
                <button 
                    id="btn-send-otp"
                    onclick="sendOtp()" 
                    class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
                >
                    Send Verification Code
                </button>
            </div>

            <div id="step-2-otp" class="hidden space-y-4">
                <p class="text-sm text-gray-500">
                    OTP sent to <span id="display-email" class="font-bold text-gray-700"></span>
                </p>
                <input 
                    type="number" 
                    id="otpInput" 
                    placeholder="Enter 6-digit OTP" 
                    class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 tracking-widest text-center"
                >
                <button 
                    id="btn-verify-otp"
                    onclick="verifyOtp()" 
                    class="w-full bg-green-500 text-white font-semibold py-2 rounded-md hover:bg-green-600 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
                >
                    Verify & Login
                </button>
                <button onclick="resetLogin()" class="text-sm text-blue-500 hover:text-blue-700 underline mt-2">
                    Change Roll Number
                </button>
            </div>

            <p id="loginStatus" class="mt-4 text-sm font-medium min-h-[20px]"></p>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen p-8 max-w-4xl mx-auto flex flex-col transition-opacity duration-300">
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-lg shadow-sm border-b-4 border-blue-500">
            <div>
                <h1 class="text-3xl font-bold text-blue-600">KiitOne Dashboard</h1>
                <p id="welcome-message" class="text-gray-500 text-sm mt-1">Welcome, Student</p>
            </div>
            <button onclick="logoutStudent()" class="text-sm font-semibold text-gray-500 hover:text-red-500 transition px-4 py-2 border rounded-md hover:border-red-500 hover:bg-red-50">
                Log Out
            </button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-grow">
            <button onclick="openApp('https://kiitfaculty.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-purple-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Faculty Review</h2>
                <p class="text-gray-500 text-sm">Read and write anonymous reviews for your professors.</p>
            </button>

            <button onclick="openApp('https://kiitresources.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-blue-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Study Material</h2>
                <p class="text-gray-500 text-sm">Access previous year papers, notes, and assignments.</p>
            </button>

            <button onclick="openApp('https://kiitcalendar.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-green-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Academic Calendar</h2>
                <p class="text-gray-500 text-sm">Track important exam dates and college holidays.</p>
            </button>

            <button onclick="openApp('https://kiitgpacalculator.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-yellow-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">GPA Calculator</h2>
                <p class="text-gray-500 text-sm">Calculate your SGPA and CGPA easily.</p>
            </button>

            <button onclick="openApp('https://kiitroutine.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-red-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Class Routine</h2>
                <p class="text-gray-500 text-sm">Check your daily lecture schedule and room numbers.</p>
            </button>
            <button onclick="openApp('https://kiitsectionswap.vercel.app/')" class="text-left block bg-white p-6 rounded-lg shadow hover:shadow-lg transition border-t-4 border-red-500 w-full transform hover:-translate-y-1">
                <h2 class="text-xl font-semibold mb-2 text-gray-800">Section Swapping</h2>
                <p class="text-gray-500 text-sm">Currently we are working on it.</p>
            </button>
        </div>

        <footer class="mt-12 text-center text-gray-400 text-sm">
            Made by Bhai Virendra 💜
        </footer>
    </div>

    <div id="app-viewer-section" class="hidden h-screen w-full flex flex-col bg-gray-100">
        <div class="bg-white shadow-sm px-6 py-4 flex items-center justify-between z-10">
            <button onclick="closeApp()" class="text-blue-600 font-semibold hover:text-blue-800 flex items-center gap-2 transition bg-blue-50 px-4 py-2 rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Back to Dashboard
            </button>
            <h1 class="text-lg font-bold text-gray-700">KiitOne</h1>
        </div>
        
        <iframe id="app-frame" src="" class="w-full flex-grow border-none"></iframe>
    </div>

    <script>
        const REVIEW_API_URL = "https://script.google.com/macros/s/AKfycbxPtgbG_fWAyJ4abuxPjgtQqLxab44U8AMafG3K4LPGmYy7hnh1VntREJtVqzcGQEQ/exec";
        const STORAGE_KEY = 'kiit_user_session_hub'; 
        
        let loggedInUser = "";
        let pendingRoll = "";
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const appViewerSection = document.getElementById('app-viewer-section');
        const appFrame = document.getElementById('app-frame');
        const statusEl = document.getElementById('loginStatus');
        window.addEventListener('DOMContentLoaded', () => {
            const storedSession = localStorage.getItem(STORAGE_KEY);
            if (storedSession) {
                try {
                    const userData = JSON.parse(storedSession);
                    if(userData && userData.roll) {
                        loggedInUser = userData.roll;
                        updateDashboardUI(userData.name);
                    }
                } catch (e) {
                    console.error("Local storage parsing error, resetting session.", e);
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
        });
        function sendOtp() {
            const rollInput = document.getElementById('kiitRoll');
            const btn = document.getElementById('btn-send-otp');
            const roll = rollInput.value.trim();
            
            if (roll.length < 5) {
                showStatus("Invalid Roll Number", "text-red-500");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending...";
            showStatus("", "");

            fetch(REVIEW_API_URL, {
                method: "POST",
                body: JSON.stringify({ action: 'send_otp', roll: roll })
            })
            .then(res => res.json())
            .then(data => {
                if (data.result === 'success') {
                    pendingRoll = roll;
                    document.getElementById('step-1-roll').classList.add('hidden');
                    document.getElementById('step-2-otp').classList.remove('hidden');
                    document.getElementById('display-email').innerText = roll + "@kiit.ac.in";
                    showStatus("OTP sent to your KIIT email.", "text-green-500");
                } else {
                    throw new Error(data.error || "Failed to send");
                }
            })
            .catch(err => {
                console.error("OTP Error:", err);
                showStatus("Error sending OTP. Check network.", "text-red-500");
                btn.disabled = false;
                btn.innerText = "Send Verification Code";
            });
        }

        function verifyOtp() {
            const otpInput = document.getElementById('otpInput');
            const btn = document.getElementById('btn-verify-otp');
            const otp = otpInput.value.trim();
            
            if (otp.length < 6) {
                showStatus("Enter 6-digit OTP", "text-red-500");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verifying...";

            fetch(REVIEW_API_URL, {
                method: "POST",
                body: JSON.stringify({ action: 'verify_otp', roll: pendingRoll, otp: otp })
            })
            .then(res => res.json())
            .then(data => {
                if (data.result === 'success') {
                    const name = data.name || ("Student " + pendingRoll);
                    const email = data.email || (pendingRoll + "@kiit.ac.in");

                    const sessionData = {
                        roll: pendingRoll,
                        name: name,
                        email: email,
                        isVerified: true
                    };

                    localStorage.setItem(STORAGE_KEY, JSON.stringify(sessionData));
                    loggedInUser = pendingRoll;
                    
                    updateDashboardUI(name);
                } else {
                    showStatus(data.error || "Invalid OTP", "text-red-500");
                    btn.disabled = false;
                    btn.innerText = "Verify & Login";
                }
            })
            .catch(err => {
                console.error("Verification Error:", err);
                showStatus("Verification failed. Check connection.", "text-red-500");
                btn.disabled = false;
                btn.innerText = "Verify & Login";
            });
        }

        function resetLogin() {
            document.getElementById('step-1-roll').classList.remove('hidden');
            document.getElementById('step-2-otp').classList.add('hidden');
            document.getElementById('btn-send-otp').disabled = false;
            document.getElementById('btn-send-otp').innerText = "Send Verification Code";
            document.getElementById('otpInput').value = "";
            showStatus("", "");
        }
        function logoutStudent() {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
        function updateDashboardUI(name) {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            document.getElementById('welcome-message').innerText = `WELCOME, ${name}`;
        }
        function showStatus(msg, colorClass) {
            statusEl.innerText = msg;
            statusEl.className = `mt-4 text-sm font-medium min-h-[20px] ${colorClass}`;
        }
        function openApp(url) {
            dashboardSection.classList.add('hidden');
            appViewerSection.classList.remove('hidden');
            appFrame.src = url; 
        }
        function closeApp() {
            appViewerSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            appFrame.src = ""; 
        }
    </script>
</body>
</html>
